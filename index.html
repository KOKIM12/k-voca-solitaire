    body, html { 
      margin: 0; 
      padding: 0;
      font-family: 'LineSeed', sans-serif; 
      overflow: hidden; 
      background: linear-gradient(to bottom, #8AC74C, #60A673, #187332);
      touch-action: none; 
    }
    
    .font-title { font-family: 'KkuBulLim', sans-serif; }

    @keyframes bounce-char {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-15px); }
    }
    .animate-bounce-char {
      display: inline-block;
      animation: bounce-char 1.8s ease-in-out infinite;
    }
    
    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-8px) rotate(-3deg); }
      75% { transform: translateX(8px) rotate(3deg); }
    }
    .animate-shake { animation: shake 0.4s ease-in-out; }
    
    @keyframes float-up {
      0% { transform: translateY(0) scale(1); opacity: 1; }
      100% { transform: translateY(-50px) scale(0.8); opacity: 0; }
    }
    .animate-float-up { animation: float-up 0.5s ease-in forwards; }
    
    @keyframes deal {
      0% { transform: translateY(-100px); opacity: 0; }
      100% { transform: translateY(0); opacity: 1; }
    }
    .animate-deal { animation: deal 0.4s ease-out forwards; }

    @keyframes fade {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    .animate-fade { animation: fade 0.2s ease-out forwards; }

    @keyframes shine {
      0% { transform: translateX(-200%) skewX(-20deg); }
      100% { transform: translateX(300%) skewX(-20deg); }
    }
    
    @keyframes ring-pulse {
      0%, 100% { box-shadow: 0 0 0 4px rgba(250, 204, 21, 1); }
      50% { box-shadow: 0 0 0 4px rgba(250, 204, 21, 0.3); }
    }
    .animate-ring-pulse {
      animation: ring-pulse 1s ease-in-out infinite;
      z-index: 50;
    }
    
    .custom-scrollbar::-webkit-scrollbar {
        width: 6px;
    }
    .custom-scrollbar::-webkit-scrollbar-track {
        background: transparent; 
    }
    .custom-scrollbar::-webkit-scrollbar-thumb {
        background: rgba(39, 174, 96, 0.5);

    // --- Web Audio API 매니저 ---
    let audioCtx = null;
    const playSound = (type) => {
      try {
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        if (audioCtx.state === 'suspended') audioCtx.resume();
        
        const osc = audioCtx.createOscillator();
        const gainNode = audioCtx.createGain();
        osc.connect(gainNode);
        gainNode.connect(audioCtx.destination);
        const now = audioCtx.currentTime;
        
        switch(type) {
          case 'click':
            osc.type = 'sine';
            osc.frequency.setValueAtTime(650, now);
            osc.frequency.exponentialRampToValueAtTime(1100, now + 0.06);
            gainNode.gain.setValueAtTime(0.12, now);
            gainNode.gain.exponentialRampToValueAtTime(0.001, now + 0.12);
            osc.start(now); osc.stop(now + 0.15);
            break;
          case 'grab':
            osc.type = 'triangle';
            osc.frequency.setValueAtTime(420, now);
            osc.frequency.linearRampToValueAtTime(550, now + 0.05);
            gainNode.gain.setValueAtTime(0.07, now);
            gainNode.gain.exponentialRampToValueAtTime(0.001, now + 0.1);
            osc.start(now); osc.stop(now + 0.1);
            break;
          case 'success':
            osc.type = 'sine';
            osc.frequency.setValueAtTime(520, now);
            osc.frequency.setValueAtTime(740, now + 0.08);
            osc.frequency.setValueAtTime(1040, now + 0.16);
            gainNode.gain.setValueAtTime(0.12, now);
            gainNode.gain.linearRampToValueAtTime(0.001, now + 0.35);
            osc.start(now); osc.stop(now + 0.35);
            break;
          case 'error':
            osc.type = 'sawtooth';
            osc.frequency.setValueAtTime(140, now);
            gainNode.gain.setValueAtTime(0.15, now);
            gainNode.gain.exponentialRampToValueAtTime(0.001, now + 0.25);
            osc.start(now); osc.stop(now + 0.25);
            break;
          case 'tick':
            osc.type = 'square';
            osc.frequency.setValueAtTime(1200, now);
            osc.frequency.exponentialRampToValueAtTime(800, now + 0.05);
            gainNode.gain.setValueAtTime(0.05, now);
            gainNode.gain.exponentialRampToValueAtTime(0.001, now + 0.05);
            osc.start(now); osc.stop(now + 0.05);
            break;
        }
      } catch (e) {
        console.error("Audio playback error", e);
      }
    };

    function GameScreen({ stage, onGameEnd, onBack, unlockWord, bgmEnabled, toggleBgm }) {
      const [columns, setColumns] = useState([]); 
      const [categories, setCategories] = useState([]); 
      const [foundations, setFoundations] = useState({}); 
      const [isInitialized, setIsInitialized] = useState(false);
      
      const [score, setScore] = useState(0);
      const [combo, setCombo] = useState(0); 
      const [timeLeft, setTimeLeft] = useState(STAGE_INFO[stage].time);
      const [gameState, setGameState] = useState('playing'); 

      const [selectedInfo, setSelectedInfo] = useState(null); 
      const [wrongId, setWrongId] = useState(null);
      
      const [items, setItems] = useState({ hint: 1, shuffle: 1, time: 1 });
      const [hintActive, setHintActive] = useState(null);
      const [hintedCards, setHintedCards] = useState(new Set()); 
      const [floatTexts, setFloatTexts] = useState([]);

      const initializeGame = useCallback(() => {
        setIsInitialized(false);
        let stageWords = shuffleArray(WORD_DB.filter(w => w.stage === stage));
        let stageCats = shuffleArray([...new Set(stageWords.map(w => w.cat))]);
        
        // 1단계: 3개 카테고리(15장), 2단계: 4개 카테고리(20장), 3단계 이상: 5개 카테고리
        let catLimit = 5;
        if (stage === 1) catLimit = 3;
        else if (stage === 2) catLimit = 4;
        
        stageCats = stageCats.slice(0, catLimit);
        // 선택된 카테고리에 해당하는 카드만 필터링
        stageWords = stageWords.filter(w => stageCats.includes(w.cat));
        
        setCategories(stageCats);
        setHintedCards(new Set());
        
        const initFoundations = {};
        stageCats.forEach(cat => initFoundations[cat] = []);
        setFoundations(initFoundations);
        
        const numCols = 4;
        const newCols = Array.from({ length: numCols }, () => []);
        stageWords.forEach((word, idx) => {
          newCols[idx % numCols].push(word);
        });

        setColumns(newCols);
        setTimeLeft(STAGE_INFO[stage].time);
        setScore(0);
        setCombo(0);
        setGameState('playing');
        setSelectedInfo(null);
        
        setTimeout(() => setIsInitialized(true), 100);
      }, [stage]);

      useEffect(() => {
        initializeGame();
      }, [initializeGame]);

      useEffect(() => {
        if (gameState !== 'playing' || !isInitialized) return;
        const timer = setInterval(() => {
          setTimeLeft(prev => {
            if (prev <= 1) {
              playSound('error');
              setGameState('lost');
              clearInterval(timer);
              return 0;
            }
            if (prev <= 11) {
              playSound('tick');
            }
            return prev - 1;
          });
        }, 1000);
        return () => clearInterval(timer);
      }, [gameState, isInitialized]);

      const addFloatText = useCallback((text, colorClass) => {
        const id = Date.now() + Math.random();
        setFloatTexts(prev => [...prev, { id, text, colorClass }]);
        setTimeout(() => {
          setFloatTexts(prev => prev.filter(t => t.id !== id));
        }, 800);
      }, []);

      const handleMatch = useCallback((wordId, colIndex, targetCat) => {
        if (gameState !== 'playing') return;
        
        const column = columns[colIndex];
        if (!column || column.length === 0) return;
        
        const bottomCard = column[column.length - 1];
        if (bottomCard.id !== wordId) return;

        if (bottomCard.cat === targetCat) {
          playSound('success');
          
          const isHinted = hintedCards.has(bottomCard.id);

          if (isHinted) {
            setCombo(0); 
            addFloatText(`통과! (도감 미수집)`, 'text-slate-300');
          } else {
            const newCombo = combo + 1; 
            const earnedScore = 100 * newCombo;
            setScore(s => s + earnedScore);
            setCombo(newCombo);
            unlockWord(bottomCard.id);
            
            addFloatText(`+${earnedScore}`, 'text-emerald-300');
            if (newCombo > 1) addFloatText(`${newCombo} 연속 정답!`, 'text-yellow-400');

            if (Math.random() < 0.15) {
              const itemTypes = ['hint', 'shuffle', 'time'];
              const dropType = itemTypes[Math.floor(Math.random() * itemTypes.length)];
              setItems(prev => ({ ...prev, [dropType]: prev[dropType] + 1 }));
              addFloatText(`도움말!`, 'text-sky-300');
            }
          }

          setHintActive(null); 
          setFoundations(prev => ({
            ...prev,
            [targetCat]: [...(prev[targetCat] || []), bottomCard]
          }));
          
          setSelectedInfo(null);
          setColumns(prev => {
            const newCols = [...prev];
            newCols[colIndex] = newCols[colIndex].slice(0, -1);
            return newCols;
          });

        } else {
          playSound('error');
          setWrongId(bottomCard.id);
          setCombo(0);
          setSelectedInfo(null);
          setTimeout(() => setWrongId(null), 400);
        }
      }, [columns, combo, gameState, hintedCards, unlockWord, addFloatText]);

      const { activeElement, handleTouchMove, handleTouchEnd } = useTouchDrag((id, targetCat) => {
        const foundColIndex = columns.findIndex(col => col.length > 0 && col[col.length - 1].id === id);
        if (foundColIndex !== -1) {
          handleMatch(id, foundColIndex, targetCat);
        }
      });

      useEffect(() => {
        if (!isInitialized) return;
        const totalRemaining = columns.reduce((acc, col) => acc + col.length, 0);
        if (totalRemaining === 0 && gameState === 'playing') {
          playSound('success'); 
          setGameState('won');
        }
      }, [columns, gameState, isInitialized]);

      const useItem = useCallback((type) => {
        if (items[type] <= 0 || gameState !== 'playing') return;
        playSound('click');
        setItems(prev => ({ ...prev, [type]: prev[type] - 1 }));
        
        if (type === 'hint') {
          const activeCards = columns.map(col => col[col.length - 1]).filter(Boolean);
          if (activeCards.length > 0) {
            const hintCard = activeCards[Math.floor(Math.random() * activeCards.length)];
            setHintActive({ cat: hintCard.cat, cardId: hintCard.id });
            setHintedCards(prev => new Set(prev).add(hintCard.id));
            setTimeout(() => setHintActive(null), 2500);
          }
        } else if (type === 'shuffle') {
          const remaining = columns.flat();
          const shuffled = shuffleArray(remaining);
          const numCols = columns.length;
          const newCols = Array.from({ length: numCols }, () => []);
          shuffled.forEach((w, i) => newCols[i % numCols].push(w));
          setColumns(newCols);
          setSelectedInfo(null);
        } else if (type === 'time') {
          setTimeLeft(prev => prev + 10);
          addFloatText('+10초', 'text-blue-300');
        }
      }, [items, gameState, columns, addFloatText]);

      const handleDragStart = (e, wordId, colIndex) => {
        playSound('grab');
        e.dataTransfer.setData('application/json', JSON.stringify({ id: wordId, colIndex }));
        setSelectedInfo({ id: wordId, colIndex });
      };

      const handleDrop = (e, targetCat) => {
        e.preventDefault();
        try {
          const data = JSON.parse(e.dataTransfer.getData('application/json'));
          if (data && data.id !== undefined && data.colIndex !== undefined) {
            handleMatch(data.id, data.colIndex, targetCat);
          }
        } catch (err) {}
      };

      const handleCategoryClick = (cat) => {
        if (selectedInfo) {
          handleMatch(selectedInfo.id, selectedInfo.colIndex, cat);
        } else {
          playSound('click');
        }
      };

      const totalRemaining = useMemo(() => columns.reduce((acc, col) => acc + col.length, 0), [columns]);

      return (
        <div className="flex-1 flex flex-col h-full w-full relative pt-16" onClick={() => setSelectedInfo(null)}>
          <div className="fixed top-0 left-0 w-full z-20" onClick={(e) => e.stopPropagation()}>

              <div className="flex items-center gap-2">
                <button onClick={() => { playSound('click'); onBack(); }} className="p-3 text-white/90 hover:text-white bg-white/20 hover:bg-white/30 rounded-full transition-colors active:scale-90 border border-white/30 shadow-sm">

                <button onClick={toggleBgm} className="p-3 text-white/90 hover:text-white bg-white/20 hover:bg-white/30 rounded-full transition-colors active:scale-90 border border-white/30 shadow-sm">
                  {bgmEnabled ? <Volume2 size={22} /> : <VolumeX size={22} />}
                </button>
              </div>
              
              <div className="flex flex-col items-center px-4 py-1.5 rounded-2xl">
                <span className="drop-shadow-xl text-[14px] font-bold text-yellow-300 tracking-wider mb-0.5">{stage}단계</span>
                <div className="flex items-center gap-1.5">
                  <Trophy size={16} className="drop-shadow-xl text-yellow-300" />
                  <span className="drop-shadow-xl font-extrabold text-2xl leading-none text-white">{score}</span>
                </div>
              </div>
              
              <div className={`flex items-center gap-1.5 font-bold px-4 py-2 rounded-2xl ${timeLeft <= 10 ? 'text-red-400 animate-pulse' : 'text-yellow-400'}`}>
                <Clock size={16} className={timeLeft <= 10 ? 'text-red-400' : 'text-yellow-300'} />
                <span className={`w-10 text-center text-2xl leading-none ${timeLeft <= 10 ? 'text-red-400' : 'text-white'}`}>{timeLeft}</span>
              </div>
            </div>
          </div>

          <div className="h-10 flex items-center justify-center relative pointer-events-none z-30 mt-2 shrink-0">
            {combo > 1 && (
              <div className="bg-yellow-400 text-slate-800 px-4 py-1 rounded-full font-black text-base shadow-lg flex items-center gap-1 border border-white/50 animate-fade">
                <Zap size={16} fill="currentColor" /> {combo} 연속 정답!
              </div>
            )}
            {floatTexts.map(ft => (
              <div key={ft.id} className={`absolute font-black text-3xl drop-shadow-lg animate-float-up pointer-events-none ${ft.colorClass}`} style={{ left: '50%', transform: 'translateX(-50%)' }}>
                {ft.text}
              </div>
            ))}
          </div>

          <div className="px-4 py-2 z-10 shrink-0" onClick={(e) => e.stopPropagation()}>
            <div className="flex flex-wrap justify-center gap-3 max-w-md mx-auto w-full">
              {categories.map((cat) => {
                const stackedCards = foundations[cat] || [];
                return (
                  <div
                    key={cat}
                    data-category={cat}
                    onDragOver={(e) => e.preventDefault()}
                    onDrop={(e) => handleDrop(e, cat)}
                    onClick={() => handleCategoryClick(cat)}
                    className={`
                      relative flex flex-col items-center justify-end w-[23%] aspect-[2/2.5] rounded-xl border-2 transition-all shadow-inner overflow-visible
                      ${hintActive?.cat === cat ? 'bg-black/10 animate-ring-pulse' : 'border-white/20 bg-black/10 hover:bg-white/10'}
                      ${selectedInfo ? 'border-dashed border-white/60 cursor-pointer bg-white/5' : 'border-solid'}
                    `}
                  >
                    <div className="absolute top-1 w-full text-center z-40">
                      <span className="text-[11px] font-bold bg-black/60 text-white/95 px-2 py-0.5 rounded backdrop-blur-sm shadow-sm">{cat}</span>
                    </div>
                    
                    {stackedCards.map((card, idx) => {
                      const isTop = idx === stackedCards.length - 1;
                      return (
                        <div 
                          key={card.id + idx} 
                          className="absolute w-full h-full bg-white rounded-xl border border-slate-300 shadow-[0_2px_4px_rgba(0,0,0,0.3)] flex flex-col items-center justify-center animate-deal"
                          style={{
                            transform: `translate(${idx * 2}px, ${idx * -3}px)`,
                            zIndex: 10 + idx 
                          }}
                        >
                          {isTop ? (
                            <>
                              <span className="text-3xl drop-shadow-sm mt-1">{card.icon}</span>
                              <span className="text-xs font-bold text-slate-800 mt-0.5 tracking-tighter">{card.word}</span>
                            </>
                          ) : (
                            <div className="w-full h-full bg-slate-100 rounded-xl opacity-90 border-t border-r border-slate-200"></div>
                          )}
                        </div>
                      );
                    })}
                    
                    {stackedCards.length === 0 && (
                      <span className={`text-sm font-bold text-center break-keep mb-3 ${selectedInfo ? 'text-white/60' : 'text-white/30'}`}>
                        여기에<br/>분류
                      </span>
                    )}
                  </div>
                );
              })}
            </div>
          </div>

          <div 
            onTouchMove={handleTouchMove}
            onTouchEnd={handleTouchEnd}
            className="flex-1 px-4 mt-2 relative z-0 w-full max-w-sm mx-auto"
          >
            <div className="flex justify-between w-full h-full">
              {columns.map((col, colIndex) => (
                <div key={`col-${colIndex}`} className="w-[23%] relative h-full">
                  {col.length === 0 && (
                    <div className="absolute top-0 w-full aspect-[2/2.5] rounded-xl border-2 border-white/10 bg-black/10"></div>
                  )}
                  {col.map((word, cardIndex) => {
                    const isBottom = cardIndex === col.length - 1; 
                    const isSelected = selectedInfo?.id === word.id;
                    const isWrong = wrongId === word.id;
                    const isHinted = hintActive?.cardId === word.id; 
                    
                    return (
                      <div
                        id={word.id}
                        key={word.id}
                        draggable={isBottom}
                        onDragStart={(e) => isBottom && handleDragStart(e, word.id, colIndex)}
                        onTouchStart={() => {
                           if (isBottom) {
                             activeElement.current = { id: word.id, colIndex };
                             playSound('grab');
                             setSelectedInfo({ id: word.id, colIndex });
                           }
                        }}
                        onClick={(e) => {
                          e.stopPropagation();
                          if (isBottom) {
                            playSound('grab');
                            setSelectedInfo({ id: word.id, colIndex });
                          }
                        }}
                        className={`
                          absolute w-full aspect-[2/2.5] rounded-xl shadow-[0_4px_8px_rgba(0,0,0,0.4)] 
                          flex flex-col items-center justify-center bg-white select-none transition-all duration-200 animate-deal
                          ${isBottom ? 'cursor-grab active:cursor-grabbing border-b-4 border-slate-300 hover:brightness-105' : 'brightness-90 border-b-2 border-slate-200'}
                          ${isSelected ? 'ring-4 ring-yellow-400 -translate-y-3 !brightness-110' : ''}
                          ${isWrong ? 'animate-shake bg-red-100 ring-4 ring-red-500' : ''}
                          ${isHinted ? 'animate-ring-pulse !brightness-110' : ''}
                        `}
                        style={{
                          top: `calc(${cardIndex} * clamp(25px, 4vh, 45px))`, 
                          zIndex: isHinted ? 40 : (isSelected ? 30 : cardIndex),
                          animationDelay: `${(colIndex * 2 + cardIndex) * 0.03}s` 
                        }}
                      >
                        <div className="text-4xl drop-shadow-sm pointer-events-none">{word.icon}</div>
                        <div className="font-bold text-sm text-slate-800 mt-2 pointer-events-none tracking-tight">{word.word}</div>
                      </div>
                    );
                  })}
                </div>
              ))}
            </div>
          </div>

          <div className="px-4 py-5 flex items-end justify-between z-10 shrink-0" onClick={(e) => e.stopPropagation()}>
            <div className="text-white/90 font-bold text-base bg-black/30 px-5 py-2.5 rounded-full backdrop-blur-sm shadow-inner border border-white/10">
              남은 단어 : <span className="text-yellow-300 ml-1">{totalRemaining}</span>
            </div>
            <div className="flex gap-3">
              <ItemButton icon={<Zap size={20}/>} count={items.hint} onClick={() => useItem('hint')} />
              <ItemButton icon={<RefreshCw size={20}/>} count={items.shuffle} onClick={() => useItem('shuffle')} />
              <ItemButton icon={<Clock size={20}/>} count={items.time} onClick={() => useItem('time')} />
            </div>
          </div>

          {gameState !== 'playing' && (
            <div className="fixed inset-0 bg-black/40 backdrop-blur-sm flex items-center justify-center p-6 z-50 animate-fade">
              <div className="bg-white p-8 rounded-3xl w-full max-w-sm text-center shadow-2xl border-4 border-[#60A673]">
                {gameState === 'won' ? (
                  <>
                    <div className="text-6xl mb-4 animate-bounce">🎉</div>
                    <h2 className="text-4xl font-title text-[#187332] mb-2">통과했어요!</h2>
                    <p className="text-slate-600 mb-6 font-bold text-lg">최종 점수: <span className="text-3xl text-yellow-500">{score}</span></p>
                    <div className="flex gap-3">
                      <button onClick={() => { playSound('click'); onBack(); }} className="flex-1 py-4 bg-slate-100 text-slate-600 rounded-xl font-bold text-lg active:scale-95 transition-transform">처음으로</button>
                      {stage < 5 ? (
                        <button onClick={() => { playSound('click'); onGameEnd(true); }} className="flex-1 py-4 bg-[#60A673] hover:bg-[#187332] text-white rounded-xl font-bold text-lg shadow-lg shadow-emerald-200 active:scale-95 transition-transform">다음 단계로</button>
                      ) : (
                        <button onClick={() => { playSound('click'); onGameEnd(true); }} className="flex-1 py-4 bg-yellow-400 text-slate-800 rounded-xl font-bold text-lg shadow-lg shadow-yellow-200 active:scale-95 transition-transform">모두 마쳤어요!</button>
                      )}
                    </div>
                  </>
                ) : (
                  <>
                    <div className="text-6xl mb-4 animate-pulse">⏱️</div>
                    <h2 className="text-4xl font-title text-red-500 mb-2">시간이 끝났어요</h2>
                    <p className="text-slate-600 mb-6 font-bold text-lg">조금만 더 빨리 분류해 보아요!</p>
                    <div className="flex gap-3">
                      <button onClick={() => { playSound('click'); onBack(); }} className="flex-1 py-4 bg-slate-100 text-slate-600 rounded-xl font-bold text-lg active:scale-95 transition-transform">처음으로</button>
                      <button onClick={() => {
                        playSound('click');
                        initializeGame();
                      }} className="flex-1 py-4 bg-red-500 text-white rounded-xl font-bold text-lg shadow-lg shadow-red-200 active:scale-95 transition-transform">다시 하기</button>
                    </div>
                  </>
                )}
              </div>
            </div>
          )}
        </div>
      );
    }

    function TreeScreen({ onBack, unlockedWords }) {
      const treeData = useMemo(() => {
        const root = { name: '모든 개념', total: 0, unlocked: 0, children: {} };
        WORD_DB.forEach(item => {
          let current = root;
          current.total++;
          if (unlockedWords.has(item.id)) current.unlocked++;

          item.path.forEach((nodeName, index) => {
            if (!current.children[nodeName]) {
              current.children[nodeName] = { name: nodeName, total: 0, unlocked: 0, children: {}, words: [] };
            }
            current = current.children[nodeName];
            current.total++;
            if (unlockedWords.has(item.id)) current.unlocked++;
            if (index === item.path.length - 1) current.words.push(item);
          });
        });
        return root;
      }, [unlockedWords]);

      const progress = unlockedWords.size / WORD_DB.length;
      let treeStage = { icon: '🌰', name: '작은 씨앗' };
      if (progress === 1) treeStage = { icon: '🍎🌳', name: '완성된 도감' };
      else if (progress >= 0.8) treeStage = { icon: '🍎🌳', name: '풍성한 나무' };
      else if (progress >= 0.5) treeStage = { icon: '🌳', name: '무성한 나무' };
      else if (progress >= 0.2) treeStage = { icon: '🌿', name: '자라나는 나무' };
      else if (progress > 0) treeStage = { icon: '🌱', name: '새싹' };

      return (
        <div className="flex-1 flex flex-col bg-slate-50 h-full relative w-full pt-16">
          <div className="fixed top-0 left-0 w-full bg-[#187332] z-20">
            <div className="w-full max-w-md mx-auto px-6 py-4 flex items-center justify-between text-white shadow-md rounded-b-2xl md:rounded-none">
              <button onClick={() => { playSound('click'); onBack(); }} className="p-3 bg-white/20 rounded-full hover:bg-white/30 transition-colors active:scale-90 border border-white/30 shadow-sm">
                <Home size={22} />
              </button>
              <h2 className="text-3xl font-title flex items-center gap-2 pt-1 text-yellow-300">
                <Book size={24}/> 개념 나무 도감
              </h2>
              <div className="text-base font-bold bg-black/20 px-4 py-1.5 rounded-full border border-white/20">
                {unlockedWords.size} / {WORD_DB.length}
              </div>
            </div>
          </div>

          <div className="p-4 overflow-y-auto flex-1 custom-scrollbar w-full max-w-md mx-auto mt-4">
            <div className="bg-white rounded-3xl shadow-sm p-6 border border-slate-100 flex flex-col items-center justify-center mb-6">
              <div className="relative overflow-hidden w-28 h-28 bg-yellow-300 rounded-full flex items-center justify-center shadow-inner mb-4">
                <div className="text-5xl z-10 drop-shadow-sm">{treeStage.icon}</div>
                <div className="absolute inset-0 z-20 pointer-events-none animate-[shine_3s_infinite_ease-in-out] bg-gradient-to-r from-transparent via-white/80 to-transparent w-1/2 h-full"></div>
              </div>
              <div className="text-2xl font-bold text-[#187332] mb-3">{treeStage.name} 단계</div>
              <div className="w-full max-w-xs h-5 bg-slate-100 rounded-full overflow-hidden border border-slate-200">
                <div 
                  className="h-full bg-gradient-to-r from-[#8AC74C] to-[#187332] transition-all duration-1000 ease-out"
                  style={{ width: `${progress * 100}%` }}
                ></div>
              </div>
              <div className="text-sm font-bold text-slate-400 mt-2">수집률 {Math.floor(progress * 100)}%</div>
            </div>

            <p className="text-center text-slate-500 mb-6 text-sm font-bold bg-white p-4 rounded-xl shadow-sm border border-slate-100">
              게임을 플레이하며 새로운 단어와 개념을 모아보세요!<br/>
              분류를 맞힐 때마다 나무가 자라납니다 🌱
            </p>
            <div className="bg-white rounded-3xl shadow-sm p-4 border border-slate-100">
              <TreeNode node={treeData} unlockedIds={unlockedWords} depth={0} />
            </div>
          </div>
        </div>
      );
    }

    const TreeNode = React.memo(({ node, unlockedIds, depth }) => {
      const [isOpen, setIsOpen] = useState(depth < 2);
      
      if (depth === 0) {
        return (
          <div className="space-y-2">
            {Object.values(node.children).map(child => (
              <TreeNode key={child.name} node={child} unlockedIds={unlockedIds} depth={depth + 1} />
            ))}
          </div>
        );
      }

      const hasChildren = Object.keys(node.children).length > 0 || node.words?.length > 0;
      const isComplete = node.total > 0 && node.unlocked === node.total;
      const isEmpty = node.unlocked === 0;

      return (
        <div className="text-left">
          <div 
            onClick={() => { playSound('click'); hasChildren && setIsOpen(!isOpen); }}
            className={`
              flex items-center justify-between py-3 px-4 rounded-xl mb-1 transition-colors
              ${depth === 1 ? 'bg-slate-100 text-slate-800 font-bold mt-2 text-lg' : 'text-slate-700 font-bold hover:bg-slate-50 text-base'}
              ${hasChildren ? 'cursor-pointer active:scale-[0.98]' : ''}
              ${isEmpty ? 'opacity-60 grayscale' : ''}
            `}
            style={{ marginLeft: depth > 1 ? `${(depth - 1) * 12}px` : '0px' }}
          >
            <div className="flex items-center gap-2">
              {depth === 1 ? '📁' : depth === 2 ? '📂' : '📄'}
              <span>{node.name}</span>
            </div>
            <div className="flex items-center gap-2 text-sm">
              {isComplete && <CheckCircle2 size={16} className="text-emerald-500" />}
              <span className={`${isComplete ? 'text-emerald-600' : 'text-slate-400'} font-bold`}>
                {node.unlocked}/{node.total}
              </span>
            </div>
          </div>

          {isOpen && (
            <div className="mb-2">
              {Object.values(node.children).map(child => (
                <TreeNode key={child.name} node={child} unlockedIds={unlockedIds} depth={depth + 1} />
              ))}
              {node.words && node.words.length > 0 && (
                <div className="grid grid-cols-2 sm:grid-cols-3 gap-3 mt-3 mb-4" style={{ marginLeft: `${depth * 12}px` }}>
                  {node.words.map(w => {
                    const isUnlocked = unlockedIds.has(w.id);
                    return (
                      <div key={w.id} className={`
                        flex flex-col items-center p-3 rounded-xl border
                        ${isUnlocked ? 'border-sky-200 bg-sky-50 shadow-sm' : 'border-slate-100 bg-slate-50 grayscale opacity-40'}
                      `}>
                        <span className="text-3xl mb-2">{isUnlocked ? w.icon : '❓'}</span>
                        <span className="font-bold text-sm text-slate-700 tracking-tighter">
                          {isUnlocked ? w.word : '???'}
                        </span>
                      </div>
                    );
                  })}
                </div>
              )}
            </div>
          )}
        </div>
      );
    });

    function App() {
      const [currentScreen, setCurrentScreen] = useState('title');
      const [unlockedWords, setUnlockedWords] = useState(() => {
        const saved = localStorage.getItem('unlockedWords');
        return saved ? new Set(JSON.parse(saved)) : new Set();
      });
      const [currentStage, setCurrentStage] = useState(1);
      
      const [bgmEnabled, setBgmEnabled] = useState(true); 
      const introAudioRef = useRef(null);
      const playAudioRef = useRef(null);

      useEffect(() => {
        introAudioRef.current = new Audio("https://github.com/KOKIM12/k-voca-solitaire/raw/refs/heads/main/intro.mp3");
        introAudioRef.current.loop = true;
        introAudioRef.current.volume = 0.4;

        playAudioRef.current = new Audio("https://github.com/KOKIM12/k-voca-solitaire/raw/refs/heads/main/play.mp3");
        playAudioRef.current.loop = true;
        playAudioRef.current.volume = 0.2;
        
        const playPromise = introAudioRef.current.play();
        if (playPromise !== undefined) {
          playPromise.catch(error => {
            console.log("자동 재생이 차단되었습니다.", error);
            setBgmEnabled(false); 
          });
        }

        return () => {
          if (introAudioRef.current) introAudioRef.current.pause();
          if (playAudioRef.current) playAudioRef.current.pause();
        };
      }, []);

      useEffect(() => {
        if (!introAudioRef.current || !playAudioRef.current) return;
        
        if (!bgmEnabled) {
          introAudioRef.current.pause();
          playAudioRef.current.pause();
          return;
        }

        if (currentScreen === 'title' || currentScreen === 'tree') {
          playAudioRef.current.pause();
          // 도감 <-> 타이틀 간 이동 시 노래가 끊기지 않도록 일시정지 상태일 때만 play 시도
          if (introAudioRef.current.paused) {
            introAudioRef.current.play().catch(e => setBgmEnabled(false));
          }
        } else if (currentScreen === 'game') {
          introAudioRef.current.pause();
          if (playAudioRef.current.paused) {
            playAudioRef.current.currentTime = 0;
            playAudioRef.current.play().catch(e => setBgmEnabled(false));
          }
        }
      }, [bgmEnabled, currentScreen]);

      const toggleBgm = useCallback(() => {
        setBgmEnabled(prev => !prev);
        playSound('click');
      }, []);

      useEffect(() => {
        localStorage.setItem('unlockedWords', JSON.stringify([...unlockedWords]));
      }, [unlockedWords]);

      const unlockWord = useCallback((id) => {
        setUnlockedWords(prev => {
          const newSet = new Set(prev);
          newSet.add(id);
          return newSet;
        });
      }, []);

      return (
        <div className="fixed inset-0 bg-gradient-to-b from-[#8AC74C] via-[#60A673] to-[#187332] text-slate-800 flex justify-center w-full selection:bg-yellow-300 overflow-hidden">
          <div className="w-full max-w-md h-full flex flex-col relative overflow-hidden mx-auto bg-transparent">
            {currentScreen === 'title' && (
              <TitleScreen 
                onStart={() => { 
                  playSound('click'); 
                  setCurrentStage(1); 
                  setCurrentScreen('game'); 
                }} 
                onTree={() => { playSound('click'); setCurrentScreen('tree'); }}
                unlockedCount={unlockedWords.size}
                totalCount={WORD_DB.length}
                bgmEnabled={bgmEnabled}
                toggleBgm={toggleBgm}
              />
            )}
            {currentScreen === 'game' && (
              <GameScreen 
                stage={currentStage} 
                onGameEnd={(win) => {
                  playSound('click');
                  if (win && currentStage < 5) {
                    setCurrentStage(prev => prev + 1);
                  } else {
                    setCurrentScreen('title');
                  }
                }} 
                onBack={() => { playSound('click'); setCurrentScreen('title'); }}
                unlockWord={unlockWord}
                bgmEnabled={bgmEnabled}
                toggleBgm={toggleBgm}
              />
            )}
            {currentScreen === 'tree' && (
              <TreeScreen 
                onBack={() => { playSound('click'); setCurrentScreen('title'); }} 
                unlockedWords={unlockedWords} 
              />
            )}
          </div>
        </div>
      );
    }

    // --- React 렌더링 ---
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
